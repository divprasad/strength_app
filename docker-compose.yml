services:
  strength-log:
    build: .
    container_name: strength-log
    restart: unless-stopped
    # ports:
    #   - "3400:3000"
    expose:
      - "3000" # Exposes to Caddy internally, no longer binds directly to the machine's ports
    volumes:
      # Named volume: survives container teardown and rebuilds.
      # Maps to /app/prisma inside the container, which is where
      # process.cwd()/prisma/strength_diary.db resolves — matching the backup
      # path logic in src/app/api/workouts/route.ts.
      - db-data:/app/prisma
      # Rolling backups mapped directly to your Mac
      - ./prisma/backups:/app/prisma/backups
    environment:
      - NODE_ENV=production
      # file:./strength_diary.db is relative to the schema location (/app/prisma),
      # so the full resolved path is /app/prisma/strength_diary.db
      - DATABASE_URL=file:./strength_diary.db

  caddy:
    image: caddy:2-alpine
    container_name: strength-caddy
    restart: unless-stopped
    ports:
      - "3400:3400" # Caddy listens on 3400 and serves HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - strength-log

volumes:
  db-data:
  caddy_data:
  caddy_config:
