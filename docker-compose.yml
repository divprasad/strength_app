services:
  strength-log:
    build: .
    container_name: strength-log
    restart: unless-stopped
    # ports:
    #   - "3400:3000"
    expose:
      - "3000" # Exposes to Caddy internally, no longer binds directly to the machine's ports
    volumes:
      # Bind mount: DB, migrations, schema, and backups are all visible
      # directly at ./db/ in the repo root on the host machine.
      # ./db/strength_diary.db  ← live production database
      # ./db/backups/           ← rolling numbered backups
      - ./db:/app/prisma
      # App log file — tail -f logs/app.log from the repo root
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      # file:./strength_diary.db is relative to the schema location (/app/prisma),
      # so the full resolved path is /app/prisma/strength_diary.db
      - DATABASE_URL=file:./strength_diary.db

  caddy:
    image: caddy:2-alpine
    container_name: strength-caddy
    restart: unless-stopped
    ports:
      - "3400:3400" # Caddy listens on 3400 and serves HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - strength-log

volumes:
  caddy_data:
  caddy_config:
