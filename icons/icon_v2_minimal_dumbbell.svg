<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="92" fill="#131519"/>
  <!-- Single clean dumbbell, stroke only -->
  <g stroke="#4A7AE8" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bar -->
    <line x1="160" y1="256" x2="352" y2="256"/>
